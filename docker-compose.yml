services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: sourcing
      POSTGRES_PASSWORD: sourcing
      POSTGRES_DB: sourcing
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  metabase:
    image: metabase/metabase:latest
    ports:
      - "3000:3000"
    depends_on:
      - postgres
volumes:
  pgdata:
